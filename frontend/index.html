<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EventHub - Login</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="center-page">

<div class="card">
    <img src="https://via.placeholder.com/60" alt="EventHub Logo" class="logo">
    <h1>Login</h1>

    <input type="text" id="username" placeholder="Enter Username">
    <button type="button" onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>

    <p>New here? <a href="signup.html">Sign Up</a></p>
    <p id="loginMessage"></p>
</div>

<script src="./script.js"></script>
</body>
</html>
