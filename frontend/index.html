<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EventHub - Smart Event Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>🎟 EventHub</h1>
    <p>Register Smart. Manage Seats. No Chaos.</p>
    <button onclick="scrollToEvents()">Explore Events</button>
</header>

<section class="auth">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <button onclick="login()">Login</button>
    <p id="welcomeMessage"></p>
</section>

<section class="admin-panel" id="adminPanel" style="display:none;">
    <h2>Admin Panel - Create Event</h2>
    <input type="text" id="eventName" placeholder="Event Name">
    <input type="date" id="eventDate">
    <input type="number" id="eventSeats" placeholder="Total Seats">
    <button onclick="createEvent()">Create Event</button>
</section>

<section class="events" id="eventsSection">
    <h2>Available Events</h2>
    <div id="eventList" class="event-container"></div>
</section>

<footer>
    <p>© 2026 EventHub | Hackathon Project</p>
</footer>

<script src="script.js"></script>
</body>
</html>
